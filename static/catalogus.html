<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/static/icon-bar-192.png">
  <link rel="apple-touch-icon" href="/static/icon-bar-192.png">
  <title>Aanbod — CIRQO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/catalogus.css?v=2">
  <link rel="stylesheet" href="/brand.css">
  <link rel="stylesheet" href="/static/ux.css">
</head>
<body>

  <header class="cat-hdr">
    <img src="/static/bouwkringloop-logo.jpg" class="cat-logo" alt="De Bouwkringloop">
    <p class="cat-hdr-sub">Ingezameld bouwmateriaal · Milieustraat Almere-Buiten</p>
  </header>

  <div class="cat-filters">
    <input type="search" id="zoek" placeholder="Zoeken…" oninput="filterItems()">
  </div>

  <div id="teller" class="cat-teller"></div>
  <div id="grid" class="cat-grid"></div>
  <div id="loading" class="cat-loading">Laden…</div>
  <div class="cat-laad-meer">
    <button id="laad-meer" class="cat-btn" style="display:none;padding:10px 28px;font-size:0.85rem;" onclick="laadItems()"></button>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox hidden" onclick="sluitLightbox(event)">
    <div class="lb-top-bar">
      <span id="lb-teller" class="lb-teller"></span>
      <button class="lb-sluit" onclick="sluitLightbox()">&times;</button>
    </div>
    <div class="lb-img-wrap">
      <button id="lb-prev" class="lb-nav" onclick="lbNavigeer(-1);event.stopPropagation()">&#8249;</button>
      <img id="lb-img" src="" alt="">
      <button id="lb-next" class="lb-nav" onclick="lbNavigeer(1);event.stopPropagation()">&#8250;</button>
    </div>
    <div class="lb-body" onclick="event.stopPropagation()">
      <h2 id="lb-label"></h2>
      <div class="lb-meta">
        <span id="lb-kg" class="lb-badge lb-green"></span>
      </div>
      <p id="lb-detail"></p>
    </div>
  </div>

  <script src="/static/catalogus.js?v=2"></script>
  <script src="/static/ux.js"></script>
</body>
</html>
